<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quest Tracker">
<meta name="theme-color" content="#c9a84c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Quest Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --surface2: #1c1c22;
    --border: #2a2a35;
    --gold: #c9a84c;
    --gold-dim: #7a6330;
    --gold-bright: #f0c860;
    --text: #e8e4d8;
    --text-dim: #8a8070;
    --red: #c0392b;
    --green: #2ecc71;
    --blue: #5b8dd9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(91,141,217,0.04) 0%, transparent 50%);
  }

  .app {
    max-width: 820px;
    margin: 0 auto;
    padding: 30px 20px 60px;
    padding-top: max(30px, env(safe-area-inset-top) + 16px);
    padding-bottom: max(60px, env(safe-area-inset-bottom) + 40px);
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }

  header::before, header::after {
    content: '——◆——';
    display: block;
    color: var(--gold-dim);
    font-size: 14px;
    letter-spacing: 4px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold-bright), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-transform: uppercase;
    padding: 8px 0;
  }

  .subtitle {
    font-size: 13px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* WEEK SELECTOR */
  .week-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  .week-nav button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }

  .week-nav button:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .week-label {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    min-width: 200px;
    text-align: center;
  }

  /* TOTAL PROGRESS */
  .total-card {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 20px 28px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
    overflow: hidden;
  }

  .total-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .total-info { flex: 1; }
  .total-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .total-hours {
    font-size: 36px;
    font-weight: 300;
    color: var(--gold-bright);
  }

  .total-hours span { font-size: 16px; color: var(--text-dim); margin-left: 4px; }

  .total-bar-wrap { flex: 2; }
  .bar-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; letter-spacing: 1px; }
  .bar-bg { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* QUESTS */
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-left: 4px;
    border-left: 2px solid var(--gold-dim);
    padding-left: 10px;
  }

  .quest-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }

  .quest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .quest-card:hover { border-color: var(--gold-dim); }

  .quest-header {
    display: flex;
    align-items: center;
    padding: 14px 18px;
    gap: 14px;
    cursor: pointer;
  }

  .quest-name {
    flex: 1;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .quest-progress-text {
    font-size: 14px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .quest-progress-text .logged { color: var(--gold-bright); font-size: 18px; }
  .quest-progress-text .target { color: var(--text-dim); }

  .quest-progress-bar {
    height: 3px;
    background: var(--surface2);
  }

  .quest-bar-fill {
    height: 100%;
    transition: width 0.5s ease;
  }

  .quest-expand {
    background: var(--surface2);
    border-top: 1px solid var(--border);
    padding: 16px 18px;
    display: none;
  }

  .quest-expand.open { display: block; }

  /* TIMER & MANUAL LOG */
  .log-controls {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .timer-section {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    min-width: 200px;
  }

  .timer-display {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 3px;
    min-width: 90px;
  }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.2s;
  }

  .btn-start {
    background: transparent;
    border-color: var(--green);
    color: var(--green);
  }

  .btn-start:hover { background: var(--green); color: #000; }

  .btn-stop {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
    display: none;
  }

  .btn-stop:hover { background: var(--red); color: #fff; }
  .btn-stop.active { display: inline-block; }
  .btn-start.hidden { display: none; }

  .manual-section {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 220px;
  }

  .manual-section label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .time-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 3px;
    width: 60px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    text-align: center;
  }

  .time-input:focus {
    outline: none;
    border-color: var(--gold-dim);
  }

  .date-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 8px;
    border-radius: 3px;
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    cursor: pointer;
    color-scheme: dark;
  }

  .date-input:focus {
    outline: none;
    border-color: var(--gold-dim);
  }

  .btn-log {
    background: transparent;
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .btn-log:hover { background: var(--gold-dim); color: #000; }

  /* LOG HISTORY */
  .log-history { margin-top: 14px; }

  .log-history-title {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .log-entries { max-height: 120px; overflow-y: auto; }

  .log-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
    animation: fadeIn 0.3s ease;
  }

  .log-entry:last-child { border-bottom: none; }

  .log-entry .duration { color: var(--gold); font-family: 'Cinzel', serif; font-size: 12px; }

  .log-entry .delete-btn {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 4px;
    transition: color 0.2s;
  }

  .log-entry .delete-btn:hover { color: var(--red); }

  /* LOG LIST TAB */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .tab:hover { color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* CHART */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .chart-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 20px;
  }

  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    height: 140px;
  }

  .chart-bar-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
  }

  .chart-bar-outer {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: flex-end;
  }

  .chart-bar-inner {
    width: 100%;
    border-radius: 2px 2px 0 0;
    transition: height 0.7s cubic-bezier(0.4,0,0.2,1);
    min-height: 2px;
    position: relative;
  }

  .chart-bar-inner:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 2px;
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 1px;
  }

  .chart-bar-label {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-top: 6px;
    text-align: center;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
  }

  /* ALL LOGS */
  .all-logs-list { display: flex; flex-direction: column; gap: 8px; }

  .all-log-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 14px;
    animation: fadeIn 0.3s ease;
  }

  .all-log-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .all-log-quest { flex: 1; color: var(--text); }
  .all-log-dur { color: var(--gold); font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; }
  .all-log-date { color: var(--text-dim); font-size: 12px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* CONFIRM DELETE MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 32px 36px;
    max-width: 340px;
    width: 90%;
    text-align: center;
    position: relative;
    animation: fadeIn 0.15s ease;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .modal-icon { font-size: 28px; margin-bottom: 12px; }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .modal-body {
    font-size: 15px;
    color: var(--text-dim);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .modal-body strong { color: var(--text); }

  .modal-actions { display: flex; gap: 12px; justify-content: center; }

  .btn-cancel {
    background: transparent;
    border-color: var(--border);
    color: var(--text-dim);
  }

  .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }

  .btn-confirm-delete {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
  }

  .btn-confirm-delete:hover { background: var(--red); color: #fff; }

  /* MONTHLY OVERVIEW */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 24px;
  }

  .month-label {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--gold);
    text-transform: uppercase;
    min-width: 160px;
    text-align: center;
  }

  .month-summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .month-summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  .month-stats-row {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .month-stat { }
  .month-stat-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .month-stat-val {
    font-size: 28px;
    font-weight: 300;
    color: var(--gold-bright);
  }

  .month-stat-val small { font-size: 14px; color: var(--text-dim); margin-left: 3px; }

  .weeks-grid { display: flex; flex-direction: column; gap: 10px; }

  .week-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .week-row:hover { border-color: var(--gold-dim); }

  .week-row-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .week-row-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .week-row-total {
    font-size: 15px;
    color: var(--gold);
  }

  .week-row-pct {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: 6px;
  }

  .week-row-bar-bg {
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }

  .week-row-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold-bright));
    transition: width 0.5s ease;
  }

  .quest-breakdown {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: none;
    flex-direction: column;
    gap: 6px;
  }

  .quest-breakdown.open { display: flex; }

  .qb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .qb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .qb-name { flex: 1; color: var(--text-dim); }
  .qb-val { color: var(--text); font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; }
  .qb-bar-bg { flex: 1; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .qb-bar-fill { height: 100%; border-radius: 2px; }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 15px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<!-- CONFIRM DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-icon">⚔️</div>
    <div class="modal-title">Confirm Delete</div>
    <div class="modal-body">Remove <strong id="deleteModalDuration"></strong> logged on <strong id="deleteModalDate"></strong>?<br>This cannot be undone.</div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn btn-confirm-delete" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="app">
  <header>
    <h1>Quest Tracker</h1>
    <p class="subtitle">Weekly Hour Chronicle</p>
  </header>

  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="weekLabel"></div>
    <button onclick="changeWeek(1)">›</button>
  </div>

  <div class="total-card">
    <div class="total-info">
      <div class="total-label">Total Logged</div>
      <div class="total-hours" id="totalHours">0<span>hrs</span></div>
    </div>
    <div class="total-bar-wrap">
      <div class="bar-meta">
        <span>Weekly Progress</span>
        <span id="totalPct">0% of 44hrs</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill" id="totalBarFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('quests', this)">Quests</button>
    <button class="tab" onclick="switchTab('chart', this)">Weekly Chart</button>
    <button class="tab" onclick="switchTab('log', this)">Log</button>
    <button class="tab" onclick="switchTab('monthly', this)">Monthly</button>
  </div>

  <div class="tab-panel active" id="tab-quests">
    <p class="section-title">Active Quests</p>
    <div class="quest-list" id="questList"></div>
  </div>

  <div class="tab-panel" id="tab-chart">
    <div class="chart-wrap">
      <div class="chart-title">Hours Logged vs Target</div>
      <div class="chart-bars" id="chartBars"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Daily Breakdown (This Week)</div>
      <div class="chart-bars" id="dailyChartBars"></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-log">
    <div class="all-logs-list" id="allLogsList"></div>
  </div>

  <div class="tab-panel" id="tab-monthly">
    <div class="month-nav">
      <button class="week-nav" style="width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:16px;" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="week-nav" style="width:34px;height:34px;border-radius:50%;background:none;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-size:16px;" onclick="changeMonth(1)">›</button>
    </div>
    <div id="monthlyContent"></div>
  </div>

<script>
const QUESTS = [
  { id: 'album', name: 'Album / World Building / Main Quest', target: 25, color: '#c9a84c' },
  { id: 'band', name: 'Band Success', target: 5, color: '#5b8dd9' },
  { id: 'stocks', name: 'Stocks / Finance / Helping John', target: 6, color: '#9b59b6' },
  { id: 'french', name: 'French', target: 4, color: '#e67e22' },
  { id: 'piano', name: 'Piano', target: 2, color: '#2ecc71' },
  { id: 'guitar', name: 'Guitar', target: 2, color: '#e74c3c' },
];

const TOTAL_TARGET = QUESTS.reduce((s, q) => s + q.target, 0);

// State
let currentWeekOffset = 0;
// IndexedDB storage - never gets wiped
let data = {};
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('QuestTrackerDB', 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('appData')) {
        db.createObjectStore('appData');
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e);
  });
}

async function loadData() {
  db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction('appData', 'readonly');
    const req = tx.objectStore('appData').get('questData');
    req.onsuccess = e => {
      data = e.target.result || {};
      resolve();
    };
    req.onerror = () => resolve();
  });
}

function saveData() {
  if (!db) return;
  const tx = db.transaction('appData', 'readwrite');
  tx.objectStore('appData').put(data, 'questData');
}
let timers = {}; // questId -> { start, interval }

function getWeekKey(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + offset * 7); // Mon
  return d.toISOString().slice(0, 10);
}

function getWeekDates(offset = 0) {
  const mon = new Date();
  mon.setDate(mon.getDate() - mon.getDay() + 1 + offset * 7);
  const sun = new Date(mon);
  sun.setDate(sun.getDate() + 6);
  return { mon, sun };
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function getWeekEntries(questId, offset = currentWeekOffset) {
  const key = getWeekKey(offset);
  return (data[questId] || []).filter(e => e.weekKey === key);
}

function getWeekTotal(questId, offset = currentWeekOffset) {
  return getWeekEntries(questId, offset).reduce((s, e) => s + e.hours, 0);
}

function getAllWeekTotal(offset = currentWeekOffset) {
  return QUESTS.reduce((s, q) => s + getWeekTotal(q.id, offset), 0);
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  render();
}

function formatHours(h) {
  if (h === 0) return '0h 0m';
  const hrs = Math.floor(h);
  const mins = Math.round((h - hrs) * 60);
  return hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
}

function formatDuration(hours) {
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function addEntry(questId, hours, dateVal) {
  if (!data[questId]) data[questId] = [];
  // dateVal is yyyy-mm-dd (from date picker) or undefined (timer = now)
  const d = dateVal ? new Date(dateVal + 'T12:00:00') : new Date();
  // Compute Monday of that week as the weekKey
  const mon = new Date(d);
  const day = mon.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  mon.setDate(mon.getDate() + diff);
  const weekKey = mon.toISOString().slice(0, 10);
  const displayDate = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  data[questId].push({
    id: Date.now() + Math.random(),
    hours,
    date: displayDate,
    isoDate: d.toISOString().slice(0, 10),
    weekKey
  });
  saveData();
  render();
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

// --- DELETE WITH CONFIRM MODAL ---
let pendingDelete = null;

function requestDelete(questId, entryId, duration, date) {
  pendingDelete = { questId, entryId };
  document.getElementById('deleteModalDuration').textContent = duration;
  document.getElementById('deleteModalDate').textContent = date;
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  pendingDelete = null;
  document.getElementById('deleteModal').classList.remove('open');
}

function confirmDelete() {
  if (!pendingDelete) return;
  const { questId, entryId } = pendingDelete;
  data[questId] = (data[questId] || []).filter(e => e.id !== entryId);
  saveData();
  closeDeleteModal();
  render();
}

// Close modal on overlay click
document.getElementById('deleteModal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteModal();
});

function deleteEntry(questId, entryId) {
  data[questId] = (data[questId] || []).filter(e => e.id !== entryId);
  saveData();
  render();
}

// Timer functions
function startTimer(questId) {
  if (timers[questId]) return;
  timers[questId] = { start: Date.now() };
  timers[questId].interval = setInterval(() => updateTimerDisplay(questId), 1000);
  document.getElementById(`start-${questId}`).classList.add('hidden');
  document.getElementById(`stop-${questId}`).classList.add('active');
}

function stopTimer(questId) {
  if (!timers[questId]) return;
  clearInterval(timers[questId].interval);
  const elapsed = (Date.now() - timers[questId].start) / 3600000;
  delete timers[questId];
  document.getElementById(`timer-${questId}`).textContent = '00:00:00';
  document.getElementById(`start-${questId}`).classList.remove('hidden');
  document.getElementById(`stop-${questId}`).classList.remove('active');
  if (elapsed > 0.003) addEntry(questId, elapsed);
}

function updateTimerDisplay(questId) {
  if (!timers[questId]) return;
  const el = document.getElementById(`timer-${questId}`);
  if (!el) return;
  const sec = Math.floor((Date.now() - timers[questId].start) / 1000);
  const h = String(Math.floor(sec / 3600)).padStart(2, '0');
  const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  el.textContent = `${h}:${m}:${s}`;
}

function logManual(questId) {
  const hEl = document.getElementById(`mh-${questId}`);
  const mEl = document.getElementById(`mm-${questId}`);
  const dEl = document.getElementById(`md-${questId}`);
  const h = parseFloat(hEl.value) || 0;
  const m = parseFloat(mEl.value) || 0;
  const total = h + m / 60;
  if (total <= 0) return;
  const dateVal = dEl.value; // yyyy-mm-dd
  addEntry(questId, total, dateVal);
  hEl.value = '';
  mEl.value = '';
}

function toggleExpand(questId) {
  const panel = document.getElementById(`expand-${questId}`);
  panel.classList.toggle('open');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'monthly') renderMonthly();
}

function render() {
  // Week label
  const { mon, sun } = getWeekDates(currentWeekOffset);
  const isCurrentWeek = currentWeekOffset === 0;
  document.getElementById('weekLabel').textContent = isCurrentWeek
    ? `This Week · ${formatDate(mon)} – ${formatDate(sun)}`
    : `${formatDate(mon)} – ${formatDate(sun)}`;

  // Total
  const total = getAllWeekTotal();
  const pct = Math.min(100, (total / TOTAL_TARGET) * 100);
  document.getElementById('totalHours').innerHTML = `${formatDuration(total)}<span></span>`;
  document.getElementById('totalPct').textContent = `${Math.round(pct)}% of ${TOTAL_TARGET}hrs`;
  document.getElementById('totalBarFill').style.width = pct + '%';

  // Quest list
  const ql = document.getElementById('questList');
  ql.innerHTML = '';
  QUESTS.forEach(q => {
    const logged = getWeekTotal(q.id);
    const qpct = Math.min(100, (logged / q.target) * 100);
    const entries = getWeekEntries(q.id);

    const card = document.createElement('div');
    card.className = 'quest-card';
    card.innerHTML = `
      <div class="quest-header" onclick="toggleExpand('${q.id}')">
        <div class="quest-name">${q.name}</div>
        <div class="quest-progress-text">
          <span class="logged">${formatDuration(logged)}</span>
          <span class="target"> / ${q.target}h</span>
        </div>
      </div>
      <div class="quest-progress-bar">
        <div class="quest-bar-fill" style="width:${qpct}%;background:${q.color};"></div>
      </div>
      <div class="quest-expand" id="expand-${q.id}">
        <div class="log-controls">
          <div class="timer-section">
            <div class="timer-display" id="timer-${q.id}">00:00:00</div>
            <button class="btn btn-start" id="start-${q.id}" onclick="startTimer('${q.id}')">Start</button>
            <button class="btn btn-stop" id="stop-${q.id}" onclick="stopTimer('${q.id}')">Stop</button>
          </div>
          <div class="manual-section">
            <label>Log:</label>
            <input class="time-input" id="mh-${q.id}" type="number" placeholder="0h" min="0" max="24">
            <span style="color:var(--text-dim);font-size:12px">:</span>
            <input class="time-input" id="mm-${q.id}" type="number" placeholder="0m" min="0" max="59">
            <input class="date-input" id="md-${q.id}" type="date" value="${todayStr()}">
            <button class="btn btn-log" onclick="logManual('${q.id}')">Log</button>
          </div>
        </div>
        ${entries.length > 0 ? `
        <div class="log-history">
          <div class="log-history-title">Recent Sessions</div>
          <div class="log-entries">
            ${entries.slice().reverse().map(e => `
              <div class="log-entry">
                <span>${e.date}</span>
                <span class="duration">${formatDuration(e.hours)}</span>
                <button class="delete-btn" onclick="requestDelete('${q.id}', ${e.id}, '${formatDuration(e.hours)}', '${e.date}')" title="Remove">×</button>
              </div>
            `).join('')}
          </div>
        </div>` : ''}
      </div>
    `;
    ql.appendChild(card);

    // Restore timer display if running
    if (timers[q.id]) {
      setTimeout(() => {
        updateTimerDisplay(q.id);
        const startBtn = document.getElementById(`start-${q.id}`);
        const stopBtn = document.getElementById(`stop-${q.id}`);
        if (startBtn) startBtn.classList.add('hidden');
        if (stopBtn) stopBtn.classList.add('active');
      }, 0);
    }
  });

  renderChart();
  renderDailyChart();
  renderLog();
}

function renderChart() {
  const container = document.getElementById('chartBars');
  const maxVal = Math.max(...QUESTS.map(q => Math.max(q.target, getWeekTotal(q.id))));
  container.innerHTML = QUESTS.map(q => {
    const logged = getWeekTotal(q.id);
    const targetPct = (q.target / maxVal) * 100;
    const loggedPct = (logged / maxVal) * 100;
    return `
      <div class="chart-bar-col">
        <div class="chart-bar-outer" style="position:relative;">
          <div style="position:absolute;bottom:0;left:0;right:0;height:${targetPct}%;background:rgba(255,255,255,0.06);border-radius:2px 2px 0 0;border-top:1px dashed ${q.color}44;"></div>
          <div class="chart-bar-inner" style="height:${loggedPct}%;background:${q.color};" data-tip="${formatDuration(logged)}"></div>
        </div>
        <div class="chart-bar-label" title="${q.name}">${q.name.split('/')[0].trim()}</div>
      </div>
    `;
  }).join('');
}

function renderDailyChart() {
  const container = document.getElementById('dailyChartBars');
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const { mon } = getWeekDates(currentWeekOffset);
  
  // Tally hours per day of week
  const dayTotals = [0,0,0,0,0,0,0];
  QUESTS.forEach(q => {
    getWeekEntries(q.id).forEach(e => {
      const d = new Date(e.date + ' ' + new Date().getFullYear());
      // fallback: just spread evenly (entries store date string, so parse best-effort)
      // We'll store actual timestamp instead
    });
  });

  // Better: sum all entries for this week by matching date string to day
  const { sun } = getWeekDates(currentWeekOffset);
  for (let i = 0; i < 7; i++) {
    const dayD = new Date(mon);
    dayD.setDate(dayD.getDate() + i);
    const dayStr = dayD.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    QUESTS.forEach(q => {
      getWeekEntries(q.id).forEach(e => {
        if (e.date === dayStr) dayTotals[i] += e.hours;
      });
    });
  }

  const maxDay = Math.max(...dayTotals, 1);
  container.innerHTML = days.map((day, i) => {
    const pct = (dayTotals[i] / maxDay) * 100;
    return `
      <div class="chart-bar-col">
        <div class="chart-bar-outer">
          <div class="chart-bar-inner" style="height:${pct}%;background:linear-gradient(180deg,#c9a84c,#7a6330);" data-tip="${formatDuration(dayTotals[i])}"></div>
        </div>
        <div class="chart-bar-label">${day}</div>
      </div>
    `;
  }).join('');
}

function renderLog() {
  const container = document.getElementById('allLogsList');
  const allEntries = [];
  QUESTS.forEach(q => {
    getWeekEntries(q.id).forEach(e => {
      allEntries.push({ ...e, questId: q.id, questName: q.name, color: q.color });
    });
  });
  allEntries.sort((a, b) => b.id - a.id);

  if (allEntries.length === 0) {
    container.innerHTML = '<div class="empty-state">No sessions logged this week.<br>Open a quest and start tracking.</div>';
    return;
  }

  container.innerHTML = allEntries.map(e => `
    <div class="all-log-item">
      <div class="all-log-dot" style="background:${e.color}"></div>
      <div class="all-log-quest">${e.questName}</div>
      <div class="all-log-dur">${formatDuration(e.hours)}</div>
      <div class="all-log-date">${e.date}</div>
      <button class="delete-btn" onclick="requestDelete('${e.questId}', ${e.id}, '${formatDuration(e.hours)}', '${e.date}')" style="color:var(--border);background:none;border:none;cursor:pointer;font-size:16px;" title="Remove">×</button>
    </div>
  `).join('');
}

// --- MONTHLY OVERVIEW ---
let currentMonthOffset = 0;

function changeMonth(dir) {
  currentMonthOffset += dir;
  renderMonthly();
}

function getWeeksInMonth(year, month) {
  const seen = new Set();
  Object.values(data).forEach(entries => {
    entries.forEach(e => { if (e.weekKey) seen.add(e.weekKey); });
  });
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let d = new Date(firstDay);
  const dow = d.getDay();
  d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
  while (d <= lastDay) {
    seen.add(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 7);
  }
  const result = [];
  seen.forEach(key => {
    const mon = new Date(key + 'T12:00:00');
    const sun = new Date(mon);
    sun.setDate(sun.getDate() + 6);
    if (mon <= lastDay && sun >= firstDay) result.push(key);
  });
  return result.sort();
}

function getTotalForWeekKey(weekKey) {
  return QUESTS.reduce((sum, q) => {
    return sum + (data[q.id] || []).filter(e => e.weekKey === weekKey).reduce((s, e) => s + e.hours, 0);
  }, 0);
}

function getQuestTotalForWeekKey(questId, weekKey) {
  return (data[questId] || []).filter(e => e.weekKey === weekKey).reduce((s, e) => s + e.hours, 0);
}

function renderMonthly() {
  const now = new Date();
  const targetDate = new Date(now.getFullYear(), now.getMonth() + currentMonthOffset, 1);
  const year = targetDate.getFullYear();
  const month = targetDate.getMonth();

  document.getElementById('monthLabel').textContent =
    targetDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const weeks = getWeeksInMonth(year, month);
  const weekTotals = weeks.map(wk => getTotalForWeekKey(wk));
  const monthTotal = weekTotals.reduce((s, v) => s + v, 0);
  const monthTarget = TOTAL_TARGET * weeks.length;
  const avgWeek = weeks.length > 0 ? monthTotal / weeks.length : 0;
  const bestWeek = Math.max(...weekTotals, 0);

  const content = document.getElementById('monthlyContent');
  content.innerHTML = `
    <div class="month-summary-card">
      <div class="month-stats-row">
        <div class="month-stat"><div class="month-stat-label">Total Hours</div><div class="month-stat-val">${formatDuration(monthTotal)}</div></div>
        <div class="month-stat"><div class="month-stat-label">Avg / Week</div><div class="month-stat-val">${formatDuration(avgWeek)}</div></div>
        <div class="month-stat"><div class="month-stat-label">Best Week</div><div class="month-stat-val">${formatDuration(bestWeek)}</div></div>
        <div class="month-stat"><div class="month-stat-label">Weeks</div><div class="month-stat-val">${weeks.length}<small>wks</small></div></div>
      </div>
      <div class="bar-meta" style="margin-bottom:6px;">
        <span style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);">Monthly Progress</span>
        <span style="font-size:12px;color:var(--text-dim);">${Math.round((monthTotal / Math.max(monthTarget, 1)) * 100)}% of ${monthTarget}h target</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100, (monthTotal / Math.max(monthTarget, 1)) * 100)}%"></div></div>
    </div>
    <p class="section-title" style="margin-bottom:12px;">Week by Week</p>
    <div class="weeks-grid">
      ${weeks.map((wk, i) => {
        const mon = new Date(wk + 'T12:00:00');
        const sun = new Date(mon); sun.setDate(sun.getDate() + 6);
        const total = weekTotals[i];
        const pct = Math.min(100, (total / TOTAL_TARGET) * 100);
        const questRows = QUESTS.map(q => {
          const qTotal = getQuestTotalForWeekKey(q.id, wk);
          const qPct = Math.min(100, (qTotal / q.target) * 100);
          return "<div class=\"qb-row\"><div class=\"qb-dot\" style=\"background:" + q.color + "\"></div><div class=\"qb-name\">" + q.name.split("/")[0].trim() + "</div><div class=\"qb-bar-bg\"><div class=\"qb-bar-fill\" style=\"width:" + qPct + "%;background:" + q.color + "80;\"></div></div><div class=\"qb-val\">" + formatDuration(qTotal) + " / " + q.target + "h</div></div>";
        }).join("");
        return "<div class=\"week-row\" onclick=\"toggleWeekBreakdown(&apos;wb-" + wk + "&apos;)\"><div class=\"week-row-header\"><div class=\"week-row-label\">" + formatDate(mon) + " \u2013 " + formatDate(sun) + "</div><div><span class=\"week-row-total\">" + formatDuration(total) + "</span><span class=\"week-row-pct\">" + Math.round(pct) + "% of " + TOTAL_TARGET + "h</span></div></div><div class=\"week-row-bar-bg\"><div class=\"week-row-bar-fill\" style=\"width:" + pct + "%\"></div></div><div class=\"quest-breakdown\" id=\"wb-" + wk + "\">" + questRows + "</div></div>";
      }).join("")}
    </div>
  `;
}

function toggleWeekBreakdown(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}


// Init: load from IndexedDB then render
loadData().then(() => { render(); });

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
